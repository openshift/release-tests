    - Test OCP-10662 (Authentication V-ACS.01-Cannot run process via user root in the container when using MustRunAsNonRoot as the RunAsUserStrategy) passed successfully on live cluster built with nightly payload
    - Test failure in Prow CI is due to test infrastructure issue, not product bug
    - Root cause: oc process command missing --local flag causing namespace context pollution between concurrent tests
