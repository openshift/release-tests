- issue: Container image health check detected 701 unhealthy images out of 851. Vulnerability
    issues identified by Product Security team and are currently under review by prod-sec.
    Release cannot proceed until prod-sec review is complete and vulnerabilities are
    addressed or waived.
  reported_at: '2026-03-17T09:12:15Z'
  resolved: true
  resolution: |-
    Product Security review completed - waiver confirmed.

    Root cause: Scanner compared RHEL 9.6 base images against RHEL 9.7 CVE database. Release 4.21.6 is built on RHEL 9.6 base. CVEs with fixes only available in RHEL 9.7 show as "unhealthy" because the scanner checks against the latest RHEL version, not the RHEL version actually used.

    Why this is not a problem: Product Security confirmed that Container Health Index alerts for CVEs fixed in newer RHEL minor versions (9.7) do not block releases built on older RHEL minor versions (9.6).

    Decision: Proceed with release.
  blocker: true
  related_tasks:
  - image-consistency-check
  resolved_at: '2026-03-17T18:53:51Z'
