issues:
- issue: 'Candidate build 4.21.0-0.nightly-2026-05-27-093820 has critical test failure:
    Case 10662 (Security Context Constraint - MustRunAsNonRoot enforcement) failed
    on ALL platforms (AWS, Azure FIPS, GCP) across ALL retry attempts (9/9 failures
    = 100% failure rate). This indicates a critical security regression where containers
    may run as root when SCC should prevent this. Test: [sig-auth] Authentication
    Author:yinzhou-WRS-ConnectedOnly-LEVEL0-High-10662-V-ACS.01-Cannot run process
    via user root in the container when using MustRunAsNonRoot as the RunAsUserStrategy'
  reported_at: '2026-05-30T08:38:57Z'
  resolved: true
  resolution: Build 4.21.18 has been promoted to stable stream. The promoted build
    does NOT have the Case 10662 security regression - all test jobs passed without
    the MustRunAsNonRoot SCC enforcement failure. The security issue was fixed between
    the candidate nightly (2026-05-27) and the promoted stable build.
  blocker: true
  related_tasks:
  - analyze-candidate-build
  resolved_at: '2026-06-01T12:31:47Z'
