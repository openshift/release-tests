    Manual verification completed - CVE tracker bug check PASSED:

    BUG: OCPBUGS-84775
    CVE: CVE-2026-31431
    Summary: rhcos: crypto: algif_aead - Revert to operating out-of-place [openshift-4.12.z]

    VERIFICATION RESULTS:
    ✅ Bug attached to advisory: RHCOS Advisory 166812 (RHBA-2026:14097)
    ✅ Bug status: Verified (by Scott Dodson, 2026-05-06)
    ✅ Fix confirmed in nightly: 4.12.0-0.nightly-2026-05-06-095208 (kernel 4.18.0-372.191.1.el8_6)
    ✅ CVE label present: CVE-2026-31431
    ✅ Bug is security-restricted: Component=RHCOS

    AUTOMATION FAILURE EXPLANATION:
    The automated check fails because OCPBUGS-84775 is NOT in shipment MR 510. This is EXPECTED and CORRECT behavior. Per ART team guidance (gparente): "RHCOS bugs are never added to image shipment MR - only to RHCOS advisory."

    CROSS-RELEASE VALIDATION:
    This is the standard workflow confirmed across all recent releases:
    - 4.17.53: OCPBUGS-84780 - same issue, resolved as "informational only"
    - 4.18.40: OCPBUGS-84781 - same issue, manually verified
    - 4.19.30: OCPBUGS-84782 - same issue, manually verified via Errata Tool API
    - 4.20.21: OCPBUGS-84792 - same issue, "Found 1 missed CVE tracker bugs" - manually verified

    CONCLUSION:
    CVE coverage requirements satisfied. Automation failure is a known false positive with RHCOS component bugs. Manual verification via advisory attachment and Scott Dodson's bug verification confirms proper configuration.

    Verified by: Manual verification (cross-checked with ART team and historical releases)
