    - Background checker was waiting for metadata URL

    However, due to critical upgrade test failures discovered after this task started, the release must be HALTED.

    Actions taken:
    - Removed QE approval from MR 520
    - Updated StateBox with blocking issues
    - Stopped change-advisory-status progression

    Next steps:
    1. File OCPBUGS for upgrade regression
    2. Coordinate fix with ART/MCO/CVO teams
    3. Prepare new build (4.14.66)
    4. Re-test upgrade path before proceeding
